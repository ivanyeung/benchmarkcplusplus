# cgroup_isolated.ini
# Complete resource isolation between steady and bursty clients
# Each client gets dedicated cores, isolated memory, and independent I/O
#
# CPU pinning: each client gets its own DEDICATED, non-overlapping cores.
# Defaults below assume a small box (>=4 cores) and give each client 2 cores.
#
# Check your core count first:  nproc   (or: lscpu | grep '^CPU(s):')
# Then widen the sets to use more cores, keeping them non-overlapping, e.g.:
#   8 cores :  client1 = 0-3        client2 = 4-7
#   16 cores:  client1 = 0-7        client2 = 8-15
# On multi-socket (NUMA) machines, put each client on its own node for best
# isolation (lscpu | grep NUMA ; numactl --hardware to see the core->node map),
# e.g. node0={0-19}, node1={20-39}: client1 = 0-19, client2 = 20-39.
# If the box has fewer cores than the IDs listed here, cgroup setup will fail
# writing cpuset.cpus — shrink these to match `nproc`.

[client1_steady]
cgroup_name = client1_steady
# CPU - dedicated cores (2 cores; widen per the note above)
cpuset.cpus = 0,1
# Memory - isolated pool
memory.high = 1G           # pressure point
memory.max = 1G            # hard cap
memory.min = 1G            # no reclamation below this limit
memory.swap.max = 0        # disable swap
# I/O - isolated bandwidth (uncomment and adjust device if needed)
io.weight = 100
# io.max = "8:0 rbps=104857600 wbps=52428800"  # example: 100MB/s read, 50MB/s write

[client2_bursty]
cgroup_name = client2_bursty
# CPU - dedicated cores (2 cores; widen per the note above)
cpuset.cpus = 2,3
# Memory - isolated pool
memory.high = 1G           # pressure point
memory.max = 1G            # hard cap
memory.min = 1G            # no reclamation below this limit
memory.swap.max = 0        # disable swap
# I/O - isolated bandwidth (uncomment and adjust device if needed)
io.weight = 100
# io.max = "8:0 rbps=104857600 wbps=52428800"  # example: 100MB/s read, 50MB/s write
