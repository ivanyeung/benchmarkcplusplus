# Fairness Benchmark Configuration
# Dual-client concurrent execution: random-read victim vs sequential-scan neighbor
#
# Both clients run simultaneously to demonstrate pagecache fairness issues.
#
# client1 (victim)   : RANDOM read, steady, rate-limited. Random reads depend on
#                      cache residency (readahead can't hide a random miss), so
#                      eviction by client2 directly inflates client1's p99.
# client2 (neighbor) : SEQUENTIAL read scan. In phase 1 it bursts with many jobs
#                      and deep iodepth (unthrottled) to evict client1's pages and
#                      saturate the I/O queue -- maximally throttling client1.
#
# Note: rate_iops limits the IOPS PER JOB. With numjobs=8 and rate_iops=1000,
#       total IOPS will be 8 * 1000 = 8000 IOPS max. Omit rate_iops for no cap.

[client1_steady]
description = Victim client - Random reader, 1G file, rate limit 50K IOPS, 4k block size
file_size = 1G
# Phase 0: steady random read (neighbor quiet)
phase_0_numjobs = 1
phase_0_runtime = 30
phase_0_pattern = randread
phase_0_block_size = 4k
phase_0_rate_iops = 50000
phase_0_iodepth = 8
phase_0_ioengine = libaio
# Phase 1: steady random read (neighbor BURSTS -> expect p99 spike here)
phase_1_numjobs = 1
phase_1_runtime = 30
phase_1_pattern = randread
phase_1_block_size = 4k
phase_1_rate_iops = 50000
phase_1_iodepth = 8
phase_1_ioengine = libaio
# Phase 2: steady random read (neighbor quiet again -> recovery)
phase_2_numjobs = 1
phase_2_runtime = 30
phase_2_pattern = randread
phase_2_block_size = 4k
phase_2_rate_iops = 50000
phase_2_iodepth = 8
phase_2_ioengine = libaio

[client2_bursty]
description = Neighbor client - Sequential scan; quiet -> heavy burst -> quiet, 32G file
file_size = 32G
# Phase 0: quiet sequential trickle
phase_0_numjobs = 1
phase_0_runtime = 30
phase_0_pattern = read
phase_0_block_size = 4k
phase_0_rate_iops = 1024
phase_0_iodepth = 8
phase_0_ioengine = libaio
# Phase 1: HEAVY sequential burst -- many jobs, deep queue, NO rate cap.
#          8 jobs x iodepth 32 = 256 outstanding reads hammering the disk and
#          flooding the page cache to evict client1 and starve its random reads.
phase_1_numjobs = 8
phase_1_runtime = 30
phase_1_pattern = read
phase_1_block_size = 4k
phase_1_iodepth = 32
phase_1_ioengine = libaio
# Phase 2: quiet sequential trickle again
phase_2_numjobs = 1
phase_2_runtime = 30
phase_2_pattern = read
phase_2_block_size = 4k
phase_2_rate_iops = 1024
phase_2_iodepth = 8
phase_2_ioengine = libaio
